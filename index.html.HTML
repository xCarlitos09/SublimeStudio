<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sublimé Studio | Catálogo</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --rose: #ffb7b2; --blue: #d4e1f5; --glass: rgba(255, 255, 255, 0.45); --text: #4a4a4a; }
        * { box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif; margin: 0; color: var(--text);
            background: linear-gradient(45deg, #fdfaf9, #e2f0d9, #f0f7ff, #fdfaf9);
            background-size: 400% 400%; animation: grad 15s ease infinite; min-height: 100vh; padding-bottom: 100px;
        }
        @keyframes grad { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        header { background: var(--glass); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.3); padding: 2rem; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 2.2rem; font-weight: 300; letter-spacing: 10px; text-transform: uppercase; margin-bottom: 1rem; }
        .search-bar { width: 100%; max-width: 500px; padding: 12px 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.5); outline: none; background: rgba(255,255,255,0.6); margin-bottom: 1.5rem; font-family: inherit; }
        
        .filters { display: flex; gap: 10px; overflow-x: auto; justify-content: center; padding: 10px; scrollbar-width: none; }
        .f-btn { background: rgba(255,255,255,0.5); border: 1px solid white; padding: 8px 22px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .f-btn.active { background: var(--rose); color: white; border-color: var(--rose); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 2rem; max-width: 1300px; margin: 0 auto; }
        .card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 30px; overflow: hidden; border: 1px solid rgba(255,255,255,0.5); transition: 0.4s; cursor: pointer; position: relative; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card.paused { filter: grayscale(1); opacity: 0.7; pointer-events: none; }
        .card.paused::after { content: 'AGOTADO'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; color: #fff; padding: 10px; border-radius: 10px; font-weight: bold; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); z-index: 2000; padding: 40px 20px; overflow-y: auto; }
        .modal-content { max-width: 1000px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        @media (max-width: 768px) { .modal-content { grid-template-columns: 1fr; } }
        .gallery img { width: 100%; border-radius: 25px; margin-bottom: 15px; }
        
        .cart-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; padding: 15px 35px; border-radius: 50px; font-weight: 700; display: flex; align-items: center; gap: 12px; cursor: pointer; box-shadow: 0 10px 40px rgba(37,211,102,0.4); }
    </style>
</head>
<body>
    <header>
        <div class="logo">Sublimé Studio</div>
        <input type="text" id="q" class="search-bar" placeholder="Buscar..." onkeyup="render()">
        <div class="filters" id="f"></div>
    </header>
    <div class="grid" id="g"></div>
    <div id="m" class="modal">
        <div style="text-align:right; max-width:1000px; margin:auto;"><span onclick="closeM()" style="font-size:3rem; cursor:pointer;">&times;</span></div>
        <div class="modal-content" id="mc"></div>
    </div>
    <div class="cart-float" onclick="checkout()"><i class="fab fa-whatsapp"></i> Mi Pedido (<span id="cc">0</span>)</div>

    <script>
        const API = "http://localhost:5000/api";
        let ps = [], cats = [], cart = [], curCat = 'Todas', activeP = null;

        async function init() {
            const rC = await fetch(`${API}/config`); const dC = await rC.json(); cats = dC.categories;
            const rP = await fetch(`${API}/products`); ps = await rP.json();
            renderF(); render();
        }
        function renderF() {
            const b = document.getElementById('f');
            b.innerHTML = `<button class="f-btn active" onclick="setCat('Todas')">Todas</button>` + 
                cats.map(c => `<button class="f-btn" onclick="setCat('${c}')">${c}</button>`).join('');
        }
        function render() {
            const query = document.getElementById('q').value.toLowerCase();
            const grid = document.getElementById('g'); grid.innerHTML = '';
            ps.filter(p => (curCat === 'Todas' || p.category === curCat) && p.name.toLowerCase().includes(query)).forEach(p => {
                grid.innerHTML += `<div class="card ${p.status=='pausa'?'paused':''}" onclick="openM(${p.id})">
                    <img src="http://localhost:5000/${p.images[0]}"><div style="padding:20px; text-align:center;"><small>${p.category}</small><h3>${p.name}</h3><p style="color:var(--rose); font-weight:bold;">$${p.price}</p></div></div>`;
            });
        }
        function setCat(c) { curCat = c; document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); render(); }
        function openM(id) {
            activeP = ps.find(p => p.id === id);
            document.getElementById('mc').innerHTML = `<div class="gallery">${activeP.images.map(i => `<img src="http://localhost:5000/${i}">`).join('')}</div>
            <div><h1>${activeP.name}</h1><p style="font-size:2rem; color:var(--rose); font-weight:bold;">$${activeP.price}</p><p>${activeP.desc}</p>
            <label>Talla:</label><select id="sz">${activeP.sizes.map(s => `<option>${s}</option>`).join('')}</select>
            <label>Color:</label><select id="cl">${activeP.colors.map(c => `<option>${c}</option>`).join('')}</select>
            <button onclick="addC()" style="width:100%; background:var(--blue); border:none; padding:18px; border-radius:20px; font-weight:bold; cursor:pointer;">Añadir al Pedido</button></div>`;
            document.getElementById('m').style.display = 'block'; document.body.style.overflow = 'hidden';
        }
        function closeM() { document.getElementById('m').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function addC() { cart.push({ name: activeP.name, price: activeP.price, size: document.getElementById('sz').value, color: document.getElementById('cl').value }); document.getElementById('cc').innerText = cart.length; closeM(); }
        function checkout() {
            if(!cart.length) return alert("Carrito vacío");
            const n = prompt("Nombre:"); const d = prompt("Dirección:");
            if(!n || !d) return;
            let m = `¡Hola Sublimé Studio! 🌸\n*Cliente:* ${n}\n*Envío:* ${d}\n\n`;
            cart.forEach(i => m += `• ${i.name} ($${i.price}) - Talla: ${i.size}, Color: ${i.color}\n`);
            window.open(`https://wa.me/584120000000?text=${encodeURIComponent(m)}`);
        }
        window.onload = init;
    </script>
</body>
</html>
